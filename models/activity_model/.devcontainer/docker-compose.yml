services:
  training:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../../..:/workspace
    devices:
      - /dev/dri
      - /dev/kfd
    group_add:
      - video
    shm_size: 16G
    ipc: host
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    network_mode: host
    command: ["bash"]
    stdin_open: true
    tty: true
