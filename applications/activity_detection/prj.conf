CONFIG_NCS_SAMPLES_DEFAULTS=y

# Axon NPU
CONFIG_NRF_AXON=y

# Interlayer buffer size — must be >= model requirement (check generated header)
CONFIG_NRF_AXON_INTERLAYER_BUFFER_SIZE=125000

# PSUM buffer (0 = disabled for dense-only models)
CONFIG_NRF_AXON_PSUM_BUFFER_SIZE=0

# LIS2DUX12 accelerometer via I2C
CONFIG_SENSOR=y
CONFIG_I2C=y
CONFIG_LIS2DUX12=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2

# Floating-point printf
CONFIG_PICOLIBC_IO_FLOAT=y

# Main stack
CONFIG_MAIN_STACK_SIZE=4096

# Application options
CONFIG_ACTIVITY_INFERENCE_INTERVAL_MS=500
